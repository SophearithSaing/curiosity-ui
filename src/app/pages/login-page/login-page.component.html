<header class="login-header">
  <a class="syn-brand" routerLink="/" aria-label="Synaptic home">
    <span class="syn-brand__mark" aria-hidden="true">
      <img class="syn-brand__logo" src="assets/logo.png" alt="" />
    </span>
    <span class="syn-brand__name">Synaptic</span>
  </a>
</header>

<main class="login-main">
  <section class="login-card" aria-labelledby="login-title">
    <div class="login-card__header">
      <h1 id="login-title">Log In</h1>
      <p>Secure access for technical mastery.</p>
    </div>

    <form class="login-form" action="#" method="post">
      <label class="syn-field" for="loginEmail">
        <span class="syn-field__label login-label"> Institutional Email </span>
        <span class="syn-input-wrap">
          <span class="material-symbols-outlined" aria-hidden="true">
            mail
          </span>
          <input
            id="loginEmail"
            class="syn-input syn-input--icon"
            name="email"
            autocomplete="email"
            placeholder="student@example.com"
            required
            type="email"
          />
        </span>
      </label>

      <label class="syn-field" for="loginPassword">
        <span class="login-field__row">
          <span class="syn-field__label login-label">Password</span>
          <a href="#forgot">Forgot Password?</a>
        </span>
        <span class="syn-input-wrap">
          <span class="material-symbols-outlined" aria-hidden="true">
            lock
          </span>
          <input
            id="loginPassword"
            class="syn-input syn-input--icon"
            name="password"
            autocomplete="current-password"
            placeholder="••••••••"
            required
            type="password"
          />
        </span>
      </label>

      <a class="syn-button syn-button--primary login-submit" routerLink="/home">
        Log In
        <span class="material-symbols-outlined" aria-hidden="true">
          arrow_forward
        </span>
      </a>
    </form>

    <div class="login-card__footer">
      <p>
        Require access?
        <a routerLink="/register">Sign Up</a>
      </p>
    </div>
  </section>
</main>
